{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-4xl px-4 py-16 sm:px-6 lg:px-8">
  <div class="rounded-[2rem] border border-slate-200 bg-white p-10 shadow-soft">
    <div class="mb-8 text-center">
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-violet-600">Inscription Médecin</p>
      <h1 class="mt-3 text-3xl font-bold text-slate-900">Rejoignez MédiRendez-vous</h1>
      <p class="mt-4 text-slate-600">Créez un compte médecin pour gérer vos consultations, disponibilités et patients.</p>
    </div>
    
    <form method="POST" action="{{ url_for('register_medecin') }}" class="space-y-6">
      {% if csrf_token %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}
      
      <div class="grid gap-6 sm:grid-cols-2">
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Prénom</label>
          <input type="text" name="prenom" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Nom</label>
          <input type="text" name="nom" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
        </div>
      </div>
      
      <div class="grid gap-6 sm:grid-cols-2">
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Email professionnel</label>
          <input type="email" name="email" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Téléphone</label>
          <input type="text" name="telephone" class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
        </div>
      </div>
      
      <div class="grid gap-6 sm:grid-cols-2">
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Spécialité</label>
          <select name="specialite" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
            <option value="" disabled selected>Choisissez une spécialité</option>
            {% for s in specialites %}
              <option value="{{ s.nom }}">{{ s.nom }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Numéro d’ordre</label>
          <input type="text" name="numero_ordre" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
        </div>
      </div>

      <div class="grid gap-6 sm:grid-cols-2">
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Tarif de consultation (FCFA)</label>
          <input type="text" name="prix" placeholder="Ex: 5000" class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
        </div>
      </div>
      
      <div class="grid gap-6 sm:grid-cols-2">
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Mot de passe</label>
          <input type="password" name="password" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Confirmez le mot de passe</label>
          <input type="password" name="confirm_password" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
        </div>
      </div>
      
      <button type="submit" class="inline-flex w-full items-center justify-center rounded-full bg-violet-600 px-6 py-3 text-sm font-semibold text-white shadow-lg transition hover:bg-violet-700">Créer mon compte médecin</button>
    </form>
  </div>
</section>
{% endblock %}
