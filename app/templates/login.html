{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-xl px-4 py-20 sm:px-6 lg:px-8">
  <div class="rounded-[2rem] border border-slate-200 bg-white p-10 shadow-soft">
    <div class="mb-8 text-center">
      <p class="text-sm font-semibold uppercase tracking-[0.3em] text-violet-600">Connexion</p>
      <h1 class="mt-3 text-3xl font-bold text-slate-900">Accédez à votre espace</h1>
      <p class="mt-4 text-slate-600">Connectez-vous pour gérer votre profil, vos rendez-vous, ou votre agenda.</p>
    </div>
    
    {% if error %}
    <div class="mb-6 rounded-[1.5rem] border border-rose-100 bg-rose-50 p-4 text-sm text-rose-700">{{ error }}</div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
      {% if csrf_token %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% endif %}
      
      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
        <input type="email" name="email" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
      </div>
      
      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-700">Mot de passe</label>
        <input type="password" name="password" required class="w-full rounded-[1.5rem] border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-violet-500 focus:ring-2 focus:ring-violet-100">
      </div>
      
      <button type="submit" class="inline-flex w-full items-center justify-center rounded-full bg-violet-600 px-6 py-3 text-sm font-semibold text-white shadow-lg transition hover:bg-violet-700">Se connecter</button>
    </form>
    
    <p class="mt-6 text-center text-sm text-slate-500">
      Pas encore de compte ? <a href="{{ url_for('register_patient') }}" class="font-semibold text-violet-700 hover:text-violet-900">Créer un compte</a>.
    </p>
  </div>
</section>
{% endblock %}
